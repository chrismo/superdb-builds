name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version string for the release (e.g. 0.1.0)'
        required: true
      sha_ref:
        description: 'SHA or ref to build from chrismo/super fork'
        required: true
      create_release:
        description: 'Create a GitHub release'
        required: false
        default: 'true'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: super-${{ github.event.inputs.version }}-linux-amd64
            goos: linux
            goarch: amd64
            build_type: static

          - os: ubuntu-24.04-arm
            artifact_name: super-${{ github.event.inputs.version }}-linux-arm64
            goos: linux
            goarch: arm64
            build_type: static

          - os: macos-latest
            artifact_name: super-${{ github.event.inputs.version }}-darwin-arm64
            goos: darwin
            goarch: arm64
            build_type: dynamic

          - os: macos-15-intel
            artifact_name: super-${{ github.event.inputs.version }}-darwin-amd64
            goos: darwin
            goarch: amd64
            build_type: dynamic

    runs-on: ${{ matrix.os }}

    steps:
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      - name: Checkout super fork
        uses: actions/checkout@v4
        with:
          repository: chrismo/super
          ref: ${{ github.event.inputs.sha_ref }}

      - name: Build super (static)
        if: matrix.build_type == 'static'
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w" -o super ./cmd/super

      - name: Build super (dynamic)
        if: matrix.build_type == 'dynamic'
        env:
          CGO_ENABLED: '1'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -o super ./cmd/super

      - name: Verify build
        run: ./super --version

      - name: Copy binary to artifacts
        env:
          ARTIFACT_NAME: ${{ matrix.artifact_name }}
        run: |
          mkdir -p artifacts
          cp super "artifacts/${ARTIFACT_NAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: artifacts/${{ matrix.artifact_name }}

  release:
    if: ${{ github.event.inputs.create_release == 'true' }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: |
            super-${{ github.event.inputs.version }}-linux-amd64/super-${{ github.event.inputs.version }}-linux-amd64
            super-${{ github.event.inputs.version }}-linux-arm64/super-${{ github.event.inputs.version }}-linux-arm64
            super-${{ github.event.inputs.version }}-darwin-arm64/super-${{ github.event.inputs.version }}-darwin-arm64
            super-${{ github.event.inputs.version }}-darwin-amd64/super-${{ github.event.inputs.version }}-darwin-amd64
          generate_release_notes: false
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          body: |
            Binary release for version ${{ github.event.inputs.version }}
            Built from chrismo/super fork at ${{ github.event.inputs.sha_ref }}
            License: BSD-3-Clause

            See also the [asdf-superdb plugin](https://github.com/chrismo/asdf-superdb).
